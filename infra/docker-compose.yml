version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: revenue_integrity_db
    environment:
      POSTGRES_DB: revenue_integrity
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst_secure_pw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d revenue_integrity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

