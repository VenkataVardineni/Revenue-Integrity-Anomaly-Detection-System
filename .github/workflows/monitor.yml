name: Revenue Integrity Monitor

on:
  # Schedule: Run every 15 minutes
  schedule:
    - cron: '*/15 * * * *'
  
  # Manual trigger with inputs
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Detection window in hours'
        required: false
        default: '1'
        type: string
      baseline_periods:
        description: 'Baseline periods (hours)'
        required: false
        default: '168'
        type: string
      skip_slack:
        description: 'Skip Slack notification'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  monitor:
    name: Run Anomaly Detection
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: revenue_integrity
          POSTGRES_USER: analyst
          POSTGRES_PASSWORD: analyst_secure_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U analyst -d revenue_integrity"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U analyst; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      
      - name: Initialize database schema
        env:
          DATABASE_URL: postgresql://analyst:analyst_secure_pw@localhost:5432/revenue_integrity
        run: |
          python src/extract.py --init-schema
      
      - name: Generate seed data (for testing)
        env:
          DATABASE_URL: postgresql://analyst:analyst_secure_pw@localhost:5432/revenue_integrity
        run: |
          python src/seed.py
      
      - name: Run detection pipeline
        id: detect
        env:
          DATABASE_URL: postgresql://analyst:analyst_secure_pw@localhost:5432/revenue_integrity
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '1' }}
          BASELINE_PERIODS: ${{ github.event.inputs.baseline_periods || '168' }}
        run: |
          python << 'PY'
          import json
          import os
          from datetime import datetime, timedelta

          from src.detect import AnomalyDetector

          window_hours = int(os.environ.get("WINDOW_HOURS", "1"))
          baseline_periods = int(os.environ.get("BASELINE_PERIODS", "168"))
          window_end = datetime.now().replace(minute=0, second=0, microsecond=0)
          window_start = window_end - timedelta(hours=window_hours)

          def write_output(name: str, value: str) -> None:
              out = os.environ["GITHUB_OUTPUT"]
              with open(out, "a", encoding="utf-8") as fh:
                  fh.write(f"{name}={value}\n")

          with AnomalyDetector() as detector:
              result = detector.run_full_pipeline(
                  window_start=window_start,
                  window_end=window_end,
                  baseline_periods=baseline_periods,
              )
              incidents = detector.get_active_incidents()

          critical_count = sum(1 for i in incidents if i.get("severity") == "critical")
          warning_count = sum(1 for i in incidents if i.get("severity") == "warning")
          should_alert = "true" if (critical_count > 0 or warning_count > 0) else "false"

          write_output("run_id", str(result["run_id"]))
          write_output("total_anomalies", str(result["total_anomalies"]))
          write_output("new_incidents", str(len(incidents)))
          write_output("critical_count", str(critical_count))
          write_output("warning_count", str(warning_count))
          write_output("should_alert", should_alert)

          with open("incidents.json", "w", encoding="utf-8") as f:
              json.dump(incidents, f, default=str, indent=2)
          PY
      
      - name: Generate report artifacts
        env:
          DATABASE_URL: postgresql://analyst:analyst_secure_pw@localhost:5432/revenue_integrity
        run: |
          RUN_ID="${{ steps.detect.outputs.run_id }}"
          python src/report.py --run-id "$RUN_ID"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-report-${{ steps.detect.outputs.run_id }}
          path: |
            artifacts/
            incidents.json
          retention-days: 30
      
      - name: Send Slack alert
        if: |
          steps.detect.outputs.should_alert == 'true' &&
          (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_slack != true) &&
          secrets.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DATABASE_URL: postgresql://analyst:analyst_secure_pw@localhost:5432/revenue_integrity
        run: |
          RUN_ID="${{ steps.detect.outputs.run_id }}"
          GITHUB_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          python -c "
          import json
          from src.slack import send_alert
          
          with open('incidents.json', 'r') as f:
              incidents = json.load(f)
          
          send_alert(
              run_id='${RUN_ID}',
              incidents=incidents,
              github_run_url='${GITHUB_RUN_URL}'
          )
          "
      
      - name: Output summary
        run: |
          echo "## Revenue Integrity Monitor Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ steps.detect.outputs.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Anomalies | ${{ steps.detect.outputs.total_anomalies }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical Incidents | ${{ steps.detect.outputs.critical_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Warning Incidents | ${{ steps.detect.outputs.warning_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.detect.outputs.should_alert }}" == "true" ]; then
            echo "### ⚠️ Alerts Detected" >> $GITHUB_STEP_SUMMARY
            echo "Check the artifacts for detailed incident reports." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ No Alerts" >> $GITHUB_STEP_SUMMARY
            echo "All metrics within normal ranges." >> $GITHUB_STEP_SUMMARY
          fi
